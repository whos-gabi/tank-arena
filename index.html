<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tank Arena boilerplate for New Media Technologies using TypeScript and Three.js."
    />
    <title>Tank Arena</title>
  </head>
  <body>
    <div id="app">
      <div id="viewport"></div>

      <div id="intro-overlay" class="intro-overlay">
        <div class="intro-card">
          <p class="intro-kicker">Top-Down Combat</p>
          <h1>Tank Arena</h1>
          <p class="intro-controls">WASD move</p>
          <p class="intro-controls">Mouse aim</p>
          <p class="intro-controls">Click / Space fire</p>
        </div>
      </div>

      <div id="game-hud" class="game-hud">
        <div class="hud-top">
          <div class="hud-panel left">
            <div class="hud-row">
              <span id="health">Hull 100</span>
              <span id="objective">Hold position</span>
            </div>
            <div class="health-meter">
              <div id="health-fill"></div>
            </div>
          </div>

          <div class="hud-panel right">
            <span id="score">Score 0</span>
            <span id="enemies">Enemies 0</span>
          </div>
        </div>

        <div class="hud-bottom">
          <p id="status">Loading...</p>
        </div>
      </div>

      <div id="lose-screen" class="lose-screen">
        <div class="lose-card">
          <p class="lose-kicker">Match Over</p>
          <h2>You Lost</h2>
          <p>Reset the arena and go again.</p>
          <button id="retry-button" type="button">Retry</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
